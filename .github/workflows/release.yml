name: Release

on:
  release:
    types: [published]

# Allow the workflow to upload assets to the release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # --ignore-scripts skips the macOS-specific `postinstall` rebuild
      # (which assumes xcrun/CXXFLAGS and breaks on Windows/Linux).
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Rebuild the native module (better-sqlite3) against Electron's ABI
      # for the current runner's platform/arch.
      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build app
        run: npm run build

      - name: Package and publish installer
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple signing certs configured — build an unsigned .dmg
          # instead of failing on a missing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false

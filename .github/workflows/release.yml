name: Release

on:
  release:
    types: [published]

# Allow the workflow to upload assets to the release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # --ignore-scripts skips the macOS-specific `postinstall` rebuild
      # (which assumes xcrun/CXXFLAGS and breaks on Windows/Linux).
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Rebuild the native module (better-sqlite3) against Electron's ABI for the
      # current runner's platform/arch. Use --only so the rebuild is restricted
      # to better-sqlite3: -w/--which-module is additive and would also try to
      # build ssh2's optional `cpu-features` dep, which fails to compile.
      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f --only better-sqlite3

      - name: Build app
        run: npm run build

      # Build the installer only (no publish). electron-builder's GitHub
      # publisher tends to upload to its own separate *draft* release, leaving
      # the release you actually published empty. We upload explicitly below.
      - name: Package installer
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          # No Apple signing certs configured — build an unsigned .dmg
          # instead of failing on a missing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Attach the built installers to the release that triggered this run.
      # On a `release: published` event this targets exactly that release.
      - name: Attach installers to the release
        uses: softprops/action-gh-release@v2
        with:
          # On a `release: published` event GITHUB_REF isn't a tag ref, so the
          # action can't infer the tag — pass it explicitly from the payload.
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.yml
            release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
